<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TGWL" />
  <meta name="description" content="Tu plataforma de fitness, salud y bienestar personalizada" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="logotipo/jus%20W%20Logo/TGWL%20--06.png" />
  <title>TGWL — The Goal Will Live</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/glassmorphism.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/components.css" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- Firebase v10 CDN (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
</head>
<body class="dark-mode">

  <!-- ═══════════════════════════════════════════
       LOADING SCREEN
  ═══════════════════════════════════════════ -->
  <div id="loading-screen" class="loading-screen active">
    <div class="auth-bg" style="position:absolute;inset:0;z-index:0">
      <img src="imagenes/Fondo%20login.png" alt="" class="auth-bg-img">
      <div class="auth-bg-overlay"></div>
    </div>
    <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:20px">
      <div class="loading-logo">
        <img src="logotipo/jus%20W%20Logo/TGWL%20--07.png" alt="TGWL" style="height:80px;filter:drop-shadow(0 0 20px rgba(25,249,249,0.4))">
      </div>
      <div class="loading-spinner"></div>
      <p class="loading-text">Cargando...</p>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       AUTH SECTION
  ═══════════════════════════════════════════ -->
  <div id="auth-section" class="auth-section hidden">
    <!-- Login View -->
    <div id="view-login" class="auth-view active">
      <div class="auth-bg">
        <img src="imagenes/Fondo%20login.png" alt="" class="auth-bg-img">
        <div class="auth-bg-overlay"></div>
      </div>
      <div class="auth-container">
        <div class="auth-logo">
          <img src="logotipo/jus%20W%20Logo/TGWL%20--07.png" alt="TGWL" style="height:72px;filter:drop-shadow(0 0 20px rgba(25,249,249,0.3))">
          <p class="auth-tagline">The Goal Will Live</p>
        </div>
        <div class="glass-card auth-card">
          <h2 class="auth-title">Bienvenido de vuelta</h2>
          <p class="auth-subtitle">Inicia sesión para continuar</p>
          <div id="auth-error" class="auth-error hidden"></div>
          <!-- Google Sign-In -->
          <button class="btn-google btn-full" id="btn-google-login">
            <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
              <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
              <path d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z" fill="#FBBC05"/>
              <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            Continuar con Google
          </button>
          <div class="auth-divider"><span>o con correo</span></div>
          <form id="login-form" class="auth-form" novalidate>
            <div class="input-group">
              <span class="input-icon">✉️</span>
              <input type="email" id="login-email" placeholder="Correo electrónico" autocomplete="email" required />
            </div>
            <div class="input-group">
              <span class="input-icon">🔒</span>
              <input type="password" id="login-password" placeholder="Contraseña" autocomplete="current-password" required />
              <button type="button" class="password-toggle" data-target="login-password">👁</button>
            </div>
            <button type="button" class="btn-link" id="btn-forgot-password">¿Olvidaste tu contraseña?</button>
            <button type="submit" class="btn-primary btn-full" id="btn-login">
              <span class="btn-text">Iniciar Sesión</span>
              <span class="btn-loader hidden"></span>
            </button>
          </form>
          <div class="auth-divider"><span>¿nuevo aquí?</span></div>
          <button class="btn-secondary btn-full" id="btn-goto-register">
            🚀 Empieza con nosotros
          </button>
        </div>
      </div>
    </div>

    <!-- Register View -->
    <div id="view-register" class="auth-view">
      <div class="auth-bg">
        <img src="imagenes/Fondo%20login.png" alt="" class="auth-bg-img">
        <div class="auth-bg-overlay"></div>
      </div>
      <div class="auth-container">
        <div class="auth-logo">
          <img src="logotipo/jus%20W%20Logo/TGWL%20--07.png" alt="TGWL" style="height:72px;filter:drop-shadow(0 0 20px rgba(25,249,249,0.3))">
          <p class="auth-tagline">The Goal Will Live</p>
        </div>
        <div class="glass-card auth-card auth-card-register">
          <button class="btn-back" id="btn-back-login">← Volver</button>
          <h2 class="auth-title">Crear cuenta</h2>
          <p class="auth-subtitle">Únete a nuestra comunidad</p>
          <div id="register-error" class="auth-error hidden"></div>
          <!-- Google Register -->
          <button class="btn-google btn-full" id="btn-google-register">
            <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
              <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
              <path d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z" fill="#FBBC05"/>
              <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            Registrarse con Google
          </button>
          <div class="auth-divider"><span>o con correo</span></div>
          <form id="register-form" class="auth-form" novalidate>
            <div class="input-group">
              <span class="input-icon">👤</span>
              <input type="text" id="reg-name" placeholder="Nombre completo" required />
            </div>
            <div class="input-group">
              <span class="input-icon">✉️</span>
              <input type="email" id="reg-email" placeholder="Correo electrónico" required />
            </div>
            <div class="input-group">
              <span class="input-icon">🔒</span>
              <input type="password" id="reg-password" placeholder="Contraseña (mín. 6 caracteres)" required />
              <button type="button" class="password-toggle" data-target="reg-password">👁</button>
            </div>
            <div class="input-group">
              <span class="input-icon">🔒</span>
              <input type="password" id="reg-password2" placeholder="Confirmar contraseña" required />
            </div>
            <button type="submit" class="btn-primary btn-full" id="btn-register">
              <span class="btn-text">Crear Cuenta</span>
              <span class="btn-loader hidden"></span>
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- Forgot Password View -->
    <div id="view-forgot" class="auth-view">
      <div class="auth-bg">
        <img src="imagenes/Fondo%20login.png" alt="" class="auth-bg-img">
        <div class="auth-bg-overlay"></div>
      </div>
      <div class="auth-container">
        <div class="auth-logo">
          <img src="logotipo/jus%20W%20Logo/TGWL%20--07.png" alt="TGWL" style="height:72px;filter:drop-shadow(0 0 20px rgba(25,249,249,0.3))">
          <p class="auth-tagline">The Goal Will Live</p>
        </div>
        <div class="glass-card auth-card">
          <button class="btn-back" id="btn-back-login-2">← Volver</button>
          <h2 class="auth-title">Recuperar contraseña</h2>
          <p class="auth-subtitle">Te enviaremos un enlace de recuperación</p>
          <div id="forgot-msg" class="auth-success hidden"></div>
          <div id="forgot-error" class="auth-error hidden"></div>
          <form id="forgot-form" class="auth-form" novalidate>
            <div class="input-group">
              <span class="input-icon">✉️</span>
              <input type="email" id="forgot-email" placeholder="Correo electrónico" required />
            </div>
            <button type="submit" class="btn-primary btn-full" id="btn-forgot-submit">
              <span class="btn-text">Enviar enlace</span>
              <span class="btn-loader hidden"></span>
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       MAIN APP
  ═══════════════════════════════════════════ -->
  <div id="app-section" class="app-section hidden">

    <!-- Top Bar -->
    <header class="top-bar glass-nav" id="top-bar">
      <div class="top-bar-left">
        <!-- Light theme: use colored/dark logo (dark text on light bg) -->
        <img src="logotipo/Horizonatal%20Logo/TGWL-08.png" alt="The Growth Lab" class="top-bar-logo logo-dark-only">
        <!-- Dark theme: use white logo TGWL-10 -->
        <img src="logotipo/Horizonatal%20Logo/TGWL-10.png" alt="The Growth Lab" class="top-bar-logo logo-light-only">
      </div>
      <div class="top-bar-right">
        <span class="top-bar-greeting" id="top-bar-greeting"></span>
        <div class="avatar-btn" id="top-bar-avatar">
          <span id="avatar-initials">?</span>
        </div>
      </div>
    </header>

    <!-- Page Container -->
    <main class="page-container" id="page-container">
      <!-- Pages rendered here dynamically -->
    </main>

    <!-- Bottom Navigation (3 core items) -->
    <nav class="bottom-nav glass-nav" id="bottom-nav">
      <button class="nav-item active" data-route="home">
        <span class="nav-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 9.5L12 3L21 9.5V20C21 20.55 20.55 21 20 21H15V15H9V21H4C3.45 21 3 20.55 3 20V9.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" fill="none"/>
          </svg>
        </span>
        <span class="nav-label" data-i18n="nav_home">Inicio</span>
      </button>
      <button class="nav-item" data-route="entreno">
        <span class="nav-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6.5 6.5H4a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h2.5M17.5 6.5H20a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1h-2.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <rect x="6.5" y="4" width="3" height="16" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
            <rect x="14.5" y="4" width="3" height="16" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
            <line x1="9.5" y1="12" x2="14.5" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="nav-label" data-i18n="nav_entreno">Entreno</span>
      </button>
      <button class="nav-item" data-route="alimentacion">
        <span class="nav-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3C9.5 3 6 5 6 9C6 12.5 8 14.5 8 16V20C8 20.55 8.45 21 9 21H15C15.55 21 16 20.55 16 20V16C16 14.5 18 12.5 18 9C18 5 14.5 3 12 3Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" fill="none"/>
            <line x1="9" y1="17" x2="15" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="12" y1="3" x2="12" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="nav-label" data-i18n="nav_nutricion">Nutrición</span>
      </button>
    </nav>
  </div>

  <!-- ═══════════════════════════════════════════
       GLOBAL MODAL SYSTEM
  ═══════════════════════════════════════════ -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-container" class="modal-container glass-card">
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- Sheet Modal (iOS style slide-up) -->
  <div id="sheet-overlay" class="sheet-overlay hidden">
    <div id="sheet-container" class="sheet-container glass-card">
      <div class="sheet-handle"></div>
      <div id="sheet-content"></div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast-container" class="toast-container"></div>

  <!-- ═══════════════════════════════════════════
       JS MODULES (ES Modules)
  ═══════════════════════════════════════════ -->
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/app.js"></script>

</body>
</html>
